<body class="bg-slate-100 p-6">
    <div class="max-w-md mx-auto bg-white p-8 rounded-2xl shadow-xl border">

        <input type="file" id="imageInput" accept="image/*" class="w-full mb-4 p-2 border rounded-xl">
        <div class="grid grid-cols-2 gap-4 mb-6">
            <input type="number" id="copies" placeholder="Qtd" class="p-3 border rounded-xl">
            <select id="orientation" class="p-3 border rounded-xl">
                <option value="p">Retrato</option>
                <option value="l">Paisagem</option>
            </select>
        </div>
        <button id="generateBtn" class="w-full bg-indigo-600 text-white py-4 rounded-xl font-bold hover:bg-indigo-700 transition">GERAR PDF PERFEITO</button>

    <script>
        // Service Worker para PWA
        const swCode = `const CACHE_NAME = 'a4-pro-v1'; self.addEventListener('install', e => e.waitUntil(caches.open(CACHE_NAME))); self.addEventListener('fetch', e => e.respondWith(caches.match(e.request).then(r => r || fetch(e.request))));`;
        const blob = new Blob([swCode], {type: 'application/javascript'});
        const swUrl = URL.createObjectURL(blob);
        if ('serviceWorker' in navigator) navigator.serviceWorker.register(swUrl);

        const { jsPDF } = window.jspdf;
        document.getElementById('generateBtn').addEventListener('click', () => {
            const file = document.getElementById('imageInput').files[0];
            if (!file) return alert("Selecione uma imagem.");
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => generatePDF(img);
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        });

        function generatePDF(img) {
            const orientation = document.getElementById('orientation').value;
            const targetCopies = parseInt(document.getElementById('copies').value) || 1;
            const doc = new jsPDF({ orientation, unit: 'mm', format: 'a4' });
            const pageWidth = doc.internal.pageSize.getWidth();
            const pageHeight = doc.internal.pageSize.getHeight();
            const imgRatio = img.width / img.height;
            
            let bestCols = 1, bestRows = 1, minCrop = Infinity;
            for (let c = 1; c <= targetCopies * 2; c++) {
                let r = Math.ceil(targetCopies / c);
                let diff = Math.abs(((pageWidth / c) / (pageHeight / r)) - imgRatio);
                if (diff < minCrop && (c * r) >= targetCopies) {
                    minCrop = diff; bestCols = c; bestRows = r;
                }
            }
            
            const totalToPrint = bestCols * bestRows;
            const cellW = pageWidth / bestCols;
            const cellH = pageHeight / bestRows;
            
            const canvas = document.createElement('canvas');
            canvas.width = 1000; canvas.height = 1000 * (cellH / cellW);
            const ctx = canvas.getContext('2d');
            const canvasRatio = canvas.width / canvas.height;
            let drawW, drawH, drawX, drawY;
            if (imgRatio > canvasRatio) {
                drawH = canvas.height; drawW = img.width * (canvas.height / img.height);
                drawX = (canvas.width - drawW) / 2; drawY = 0;
            } else {
                drawW = canvas.width; drawH = img.height * (canvas.width / img.width);
                drawX = 0; drawY = (canvas.height - drawH) / 2;
            }
            
            ctx.fillStyle = "#ffffff"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(img, drawX, drawY, drawW, drawH);
            const croppedImgData = canvas.toDataURL('image/jpeg', 0.95);
            
            for (let i = 0; i < totalToPrint; i++) {
                if (i > 0 && i % (bestCols * bestRows) === 0) doc.addPage();
                doc.addImage(croppedImgData, 'JPEG', (i % bestCols) * cellW, Math.floor((i % (bestCols * bestRows)) / bestCols) * cellH, cellW, cellH);
            }
            doc.save("Folha_A4_Final.pdf");
        }
    </script>
