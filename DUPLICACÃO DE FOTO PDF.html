<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador A4 Definitivo</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-200 min-h-screen flex items-center justify-center p-4">
    <div class="max-w-lg w-full bg-white p-8 rounded-2xl shadow-xl border border-slate-300">
        <div class="mb-8 text-center">
            <h1 class="text-2xl font-black text-slate-800 mb-2">Impressão 100% Preenchida</h1>
            <p class="text-sm text-slate-500">Garante zero espaços em branco na folha.</p>
        </div>
        
        <div class="space-y-5">
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-1">1. Escolha a sua imagem</label>
                <input type="file" id="imageInput" accept="image/*" class="w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100 border p-2 rounded-xl transition">
            </div>
            
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-1">2. Orientação</label>
                    <select id="orientation" class="w-full border p-3 rounded-xl bg-slate-50 focus:ring-2 focus:ring-indigo-500 outline-none">
                        <option value="p">Retrato (Em pé)</option>
                        <option value="l">Paisagem (Deitada)</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-1">3. Cópias</label>
                    <input type="number" id="copies" value="30" min="1" class="w-full border p-3 rounded-xl bg-slate-50 focus:ring-2 focus:ring-indigo-500 outline-none">
                </div>
            </div>

            <button id="generateBtn" class="w-full bg-gradient-to-r from-indigo-600 to-blue-600 hover:from-indigo-700 hover:to-blue-700 text-white font-black py-4 rounded-xl shadow-lg transform transition hover:scale-[1.02] active:scale-95">
                GERAR PDF PERFEITO
            </button>
        </div>
    </div>

    <script>
        // Lógica do PDF
        const { jsPDF } = window.jspdf;
        document.getElementById('generateBtn').addEventListener('click', () => {
            const fileInput = document.getElementById('imageInput');
            if (fileInput.files.length === 0) return alert("Por favor, selecione uma imagem primeiro.");
            const btn = document.getElementById('generateBtn');
            btn.innerText = "A PROCESSAR...";
            const file = fileInput.files[0];
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    generateUltimatePDF(img);
                    btn.innerText = "GERAR PDF PERFEITO";
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        });

        function generateUltimatePDF(img) {
            const orientation = document.getElementById('orientation').value;
            const targetCopies = parseInt(document.getElementById('copies').value) || 1;
            const doc = new jsPDF({ orientation, unit: 'mm', format: 'a4' });
            const pageWidth = doc.internal.pageSize.getWidth();
            const pageHeight = doc.internal.pageSize.getHeight();
            const imgRatio = img.width / img.height;
            let bestCols = 1, bestRows = 1, minCrop = Infinity;
            for (let c = 1; c <= targetCopies * 2; c++) {
                let r = Math.ceil(targetCopies / c);
                let cellRatio = (pageWidth / c) / (pageHeight / r);
                let diff = Math.abs(cellRatio - imgRatio);
                if (diff < minCrop && (c * r) >= targetCopies) {
                    minCrop = diff; bestCols = c; bestRows = r;
                }
            }
            const totalToPrint = bestCols * bestRows;
            const cellW = pageWidth / bestCols;
            const cellH = pageHeight / bestRows;
            const canvas = document.createElement('canvas');
            canvas.width = 1200; canvas.height = 1200 * (cellH / cellW);
            const ctx = canvas.getContext('2d');
            const canvasRatio = canvas.width / canvas.height;
            let drawW, drawH, drawX, drawY;
            if (imgRatio > canvasRatio) {
                drawH = canvas.height; drawW = img.width * (canvas.height / img.height);
                drawX = (canvas.width - drawW) / 2; drawY = 0;
            } else {
                drawW = canvas.width; drawH = img.height * (canvas.width / img.width);
                drawX = 0; drawY = (canvas.height - drawH) / 2;
            }
            ctx.fillStyle = "#ffffff"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(img, drawX, drawY, drawW, drawH);
            const croppedImgData = canvas.toDataURL('image/jpeg', 0.95);
            for (let i = 0; i < totalToPrint; i++) {
                doc.addImage(croppedImgData, 'JPEG', (i % bestCols) * cellW, Math.floor(i / bestCols) * cellH, cellW, cellH);
            }
            doc.save("A4_Preenchimento_Total.pdf");
        }

        // Lógica PWA (Atualização Automática)
        if ('serviceWorker' in navigator) {
            let refreshing = false;
            navigator.serviceWorker.addEventListener('controllerchange', () => {
                if (refreshing) return;
                refreshing = true;
                window.location.reload();
            });

            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./service-worker.js');
            });
        }
    </script>
</body>
</html>
